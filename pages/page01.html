<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Présentation 💙</title>
  <link rel="stylesheet" href="../style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet" />
</head>
<body>
  <button id="toggle-dark" title="Changer le thème">☀️</button>
  <div class="page-blanche" style="position: relative; justify-content: flex-start; padding-top: 20px;">
    <h1 class="titre-classique">Présentation 💙</h1>
    <img src="../photo.jpg" alt="Photo d'Enola"
      style="max-height: 50vh; width: auto; margin: 10px 0; border-radius: 40px;" />
    <p style="margin: 10px 0; font-size: 17px; max-width: 650px;">
      Il y a des rencontres qui changent une vie. Enola en fait partie. Depuis 9 ans, elle est mon pilier, mon ange gardien, celle qui m'a tendu la main quand j'en avais le plus besoin. Chaque mot ici est une trace de l'amour que j'ai pour mon amour d'Enola.
    </p>
    <div class="numero-page" style="position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);">Page 1</div>
    <a href="../index.html" class="fleche-gauche">←</a>
    <a href="page02.html" class="fleche-droite">→</a>
  </div>
  <script>
    const btn = document.getElementById('toggle-dark');
    const dark = localStorage.getItem('dark') === 'true';
    if (dark) { document.body.classList.add('dark-mode'); btn.textContent = '🌙'; }
    btn.addEventListener('click', () => {
      document.body.classList.toggle('dark-mode');
      const isDark = document.body.classList.contains('dark-mode');
      btn.textContent = isDark ? '🌙' : '☀️';
      localStorage.setItem('dark', isDark);
    });
    document.querySelectorAll('a').forEach(link => {
      link.addEventListener('click', function (e) {
        const href = this.getAttribute('href');
        if (href && !href.startsWith('#') && !href.startsWith('javascript')) {
          e.preventDefault();
          document.body.classList.add('fade-out');
          setTimeout(() => { window.location.href = href; }, 600);
        }
      });
    });
  </script>
</body>
</html>
